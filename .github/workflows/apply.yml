name: Apply IAM OIDC Roles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: iam-apply-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_aws: ${{ vars.TF_VAR_AWS }}
  TF_VAR_github: ${{ vars.TF_VAR_GITHUB }}

jobs:
  apply:
    name: OpenTofu Apply
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.12.3
          tofu_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}

      - name: Download role definitions
        env:
          AWS_S3_ROLES_BUCKET_URI: ${{ secrets.AWS_S3_ROLES_BUCKET_URI }}
        run: |
          mkdir -p roles
          find roles -type f -name '*.yml' -delete
          aws s3 cp "$AWS_S3_ROLES_BUCKET_URI" roles/ --recursive --exclude "*" --include "*.yml"

      - name: OpenTofu format check
        run: tofu fmt -check -recursive

      - name: OpenTofu init
        run: tofu init -input=false

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu apply
        run: tofu apply -auto-approve -input=false
